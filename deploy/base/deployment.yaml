apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-k8s
  labels:
    app.kubernetes.io/name: hello-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-k8s
    spec:
      # Pod-level hardening.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hello-k8s
          image: hello-k8s:latest
          imagePullPolicy: IfNotPresent # use the image loaded into kind, don't pull
          ports:
            - name: http
              containerPort: 8080
          env:
            # Surface identity via the downward API so /version shows real values.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Container-level hardening.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          # Startup gates liveness/readiness until the process is up; then
          # liveness restarts a wedged pod and readiness controls traffic.
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 1
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 20

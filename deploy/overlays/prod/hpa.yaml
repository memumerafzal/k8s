apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hello-k8s
  labels:
    app.kubernetes.io/name: hello-k8s
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-k8s
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
